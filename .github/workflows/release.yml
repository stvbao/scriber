name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS (Apple Silicon) ────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-14   # M1 runner (arm64)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python and install dependencies
        run: |
          source $HOME/.cargo/env
          uv python install 3.12
          uv sync --all-extras

      - name: Build app with PyInstaller
        env:
          PYINSTALLER_CONFIG_DIR: ${{ runner.temp }}/pyinstaller
        run: |
          source $HOME/.cargo/env
          uv run pyinstaller scriber-mac.spec --noconfirm

      - name: Build CLI with PyInstaller
        env:
          PYINSTALLER_CONFIG_DIR: ${{ runner.temp }}/pyinstaller
        run: |
          source $HOME/.cargo/env
          uv run pyinstaller scriber-cli-mac.spec --noconfirm

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          STAGING="dist/dmg_staging"
          mkdir -p "$STAGING"
          cp -r dist/Scriber.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "Scriber $VERSION" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            "dist/Scriber-${VERSION}-macos-arm64.dmg"

      - name: Create CLI tarball (for Homebrew)
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          tar -czf "dist/scriber-${VERSION}-macos-arm64.tar.gz" -C dist/scriber-cli .

      - name: Compute SHA256 for Homebrew formula
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          shasum -a 256 "dist/scriber-${VERSION}-macos-arm64.tar.gz"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: |
            dist/Scriber-*-macos-arm64.dmg
            dist/scriber-*-macos-arm64.tar.gz

  # ── Windows (x86_64) ─────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: powershell -c "irm https://astral.sh/uv/install.ps1 | iex"

      - name: Set up Python and install dependencies
        run: |
          uv python install 3.12
          uv sync

      - name: Build exe with PyInstaller
        run: uv run pyinstaller scriber-win.spec --noconfirm

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create zip
        shell: pwsh
        run: |
          $Version = "${{ steps.version.outputs.VERSION }}"
          Compress-Archive `
            -Path "dist\Scriber" `
            -DestinationPath "dist\Scriber-${Version}-windows.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dist/Scriber-*-windows.zip

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Scriber v${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Install

            **macOS (Apple Silicon, M1–M5)**
            Download `Scriber-${{ steps.version.outputs.VERSION }}-macos-arm64.dmg`, open it, drag Scriber to Applications.

            > First launch: right-click → Open to bypass Gatekeeper (app is unsigned).

            **Windows**
            Run the PowerShell install script:
            ```powershell
            irm https://raw.githubusercontent.com/stvbao/scriber/main/scripts/install.ps1 | iex
            ```
            Or download `Scriber-${{ steps.version.outputs.VERSION }}-windows.zip` and extract anywhere.

            **Homebrew (macOS CLI)**
            ```
            brew tap stvbao/scriber
            brew install scriber
            ```
            *(Update `Formula/scriber.rb` with the sha256 from this release's `scriber-${{ steps.version.outputs.VERSION }}-macos-arm64.tar.gz`.)*

            ## What's new
            See [PLAN.md](https://github.com/stvbao/scriber/blob/main/PLAN.md) for details.
          files: artifacts/*
