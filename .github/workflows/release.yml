name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS CLI (Apple Silicon, Homebrew artifact) ────────────────────────────
  build-cli-mac:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python and install dependencies
        run: |
          source $HOME/.cargo/env
          uv python install 3.12
          uv sync --all-extras

      - name: Build CLI with PyInstaller
        env:
          PYINSTALLER_CONFIG_DIR: ${{ runner.temp }}/pyinstaller
        run: |
          source $HOME/.cargo/env
          uv run pyinstaller scriber-cli-mac.spec --noconfirm

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create CLI tarball (for Homebrew)
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          tar -czf "dist/scriber-${VERSION}-macos-arm64.tar.gz" -C dist/scriber-cli .

      - name: Compute SHA256 for Homebrew formula
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          shasum -a 256 "dist/scriber-${VERSION}-macos-arm64.tar.gz"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cli-mac-artifacts
          path: dist/scriber-*-macos-arm64.tar.gz

  # ── GitHub Release (CLI only) ────────────────────────────────────────────────
  release:
    needs: [build-cli-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "Scriber v${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Install

            **Homebrew (macOS CLI)**
            ```
            brew tap stvbao/scriber https://github.com/stvbao/scriber
            brew install scriber
            ```

            This release publishes the CLI tarball only:
            `scriber-${{ steps.version.outputs.VERSION }}-macos-arm64.tar.gz`

            After the release is published, update `Formula/scriber.rb` with the
            sha256 from that tarball so Homebrew installs the new version.

            ## What's new
            See [PLAN.md](https://github.com/stvbao/scriber/blob/main/PLAN.md) for details.
          files: artifacts/*
